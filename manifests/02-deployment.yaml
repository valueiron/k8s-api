apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-api
  namespace: k8s-api
  labels:
    app.kubernetes.io/name: k8s-api
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-api
        app.kubernetes.io/version: "1.0.0"
    spec:
      serviceAccountName: k8s-api

      # Prevent pods from being scheduled on the same node.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: k8s-api

      # Distroless nonroot image already runs as 65532; enforce it at the
      # Pod level so Kubernetes rejects any misconfigured image.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: k8s-api
          # ---------------------------------------------------------------
          # Replace this with your registry path before applying, e.g.:
          #   docker.io/youruser/k8s-api:latest
          #   ghcr.io/yourorg/k8s-api:latest
          #   172.22.150.196:5000/k8s-api:latest   (local registry)
          # See load-image.sh for loading the image directly onto nodes.
          # ---------------------------------------------------------------
          image: k8s-api:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: PORT
              value: "8080"

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # /health is served by the binary itself — no external tool needed.
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10

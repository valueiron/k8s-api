---
# ServiceAccount used by the k8s-api Pod.
# The in-cluster config automatically mounts its token at
# /var/run/secrets/kubernetes.io/serviceaccount/.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-api
  namespace: k8s-api
  labels:
    app.kubernetes.io/name: k8s-api
automountServiceAccountToken: true

---
# ClusterRole grants the minimum verbs required by each handler.
# Scoped to ClusterRole (not Role) because the API serves resources
# across all namespaces and needs node/namespace cluster-wide access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-api
  labels:
    app.kubernetes.io/name: k8s-api
rules:
  # Pods — list, inspect, delete, restart (delete)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]

  # Pod logs — streamed by GetPodLogs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  # Services — full CRUD
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]

  # Namespaces — full CRUD (cluster-scoped resource)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]

  # ConfigMaps — full CRUD
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "delete"]

  # PersistentVolumeClaims — full CRUD
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]

  # Nodes — read-only (list + inspect)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

  # Deployments — full CRUD + patch (for rolling restart)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "delete", "patch"]

  # Deployment scale subresource — used by ScaleDeployment
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update"]

  # Pod metrics — requires metrics-server; gracefully degraded when absent
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get"]

---
# Bind the ClusterRole to the k8s-api ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-api
  labels:
    app.kubernetes.io/name: k8s-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-api
subjects:
  - kind: ServiceAccount
    name: k8s-api
    namespace: k8s-api
